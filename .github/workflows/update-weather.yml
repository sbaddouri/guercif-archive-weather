name: Update Weather Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *' # Every day at 2 AM
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Fetch weather data
        id: fetch
        run: npx tsx scripts/fetch-weather.ts
        
      - name: Commit and push changes (including status)
        if: always() # Always commit the status file, even if it failed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ # Add all data files including the status file
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update weather data and status [skip ci]"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" main
          fi
